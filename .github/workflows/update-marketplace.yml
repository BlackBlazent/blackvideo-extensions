name: Update marketplace.json

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to update (e.g. video-map-space@1.2.0). Leave blank to rebuild all."
        required: false

jobs:
  update-marketplace:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: Run marketplace update script
        env:
          GITHUB_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ github.event.release.tag_name || inputs.release_tag }}
        run: npx ts-node scripts/update-marketplace.ts

      - name: Commit updated marketplace.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add marketplace.json
          git diff --staged --quiet || git commit -m "chore: update marketplace.json [skip ci]"
          git push